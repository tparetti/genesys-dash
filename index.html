<title>Genesys — Dashboard Licenças</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter",sans-serif;background:#f5f7fa;color:#1e293b;font-size:14px}
.wrap{max-width:1400px;margin:0 auto;padding:24px 20px}
h1{font-size:22px;font-weight:800;margin-bottom:4px}
.sub{font-size:12px;color:#94a3b8;margin-bottom:20px}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
@media(max-width:800px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px}
.kpi .v{font-size:24px;font-weight:800;line-height:1.1}.kpi .l{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.kpi.bad .v{color:#dc2626}.kpi.ok .v{color:#059669}.kpi.warn .v{color:#d97706}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filters input{padding:8px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;width:250px;font-family:inherit}
.filters input:focus{outline:none;border-color:#4f46e5}
.filters select{padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit}
.filters .fbtn{padding:7px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#64748b;font-family:inherit}
.filters .fbtn:hover{background:#f8fafc}.filters .fbtn.active{background:#4f46e5;color:#fff;border-color:#4f46e5}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e2e8f0}
th{background:#f8fafc;text-align:left;padding:10px 14px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#64748b;font-weight:700;cursor:pointer;white-space:nowrap;border-bottom:1px solid #e2e8f0;position:sticky;top:0}
th:hover{color:#4f46e5}
td{padding:10px 14px;border-bottom:1px solid #f1f5f9;font-size:13px}
tr:hover{background:#fafbfc}
tr.gap-bad{background:#fef2f2}tr.gap-bad:hover{background:#fee2e2}
.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase}
.tag-bad{background:#fee2e2;color:#991b1b}.tag-ok{background:#d1fae5;color:#065f46}.tag-warn{background:#fef3c7;color:#92400e}
.client-name{font-weight:700;color:#1e293b;cursor:pointer}.client-name:hover{color:#4f46e5;text-decoration:underline}
.bar{height:8px;border-radius:4px;display:flex;overflow:hidden;background:#f1f5f9}
.bar-c{background:#ef4444;height:100%}.bar-r{background:#22c55e;height:100%}
.detail{display:none;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:20px}
.detail.open{display:block}
.detail h2{font-size:18px;margin-bottom:4px}.detail .dmeta{font-size:12px;color:#94a3b8;margin-bottom:16px}
.detail .dkpis{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.detail .dk{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;font-size:12px}
.detail .dk b{font-size:18px;display:block;margin-bottom:2px}
.detail .dk.bad b{color:#dc2626}.detail .dk.ok b{color:#059669}
.chart{display:flex;gap:4px;align-items:flex-end;height:120px;margin-bottom:16px;padding:0 4px}
.chart-bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0}
.chart-bar .cb{width:100%;border-radius:3px 3px 0 0;min-height:1px;position:relative}
.chart-bar .cb.c{background:#fca5a5}.chart-bar .cb.r{background:#86efac}
.chart-bar .cl{font-size:8px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center}
.items-table{font-size:12px;width:100%;border-collapse:collapse;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.items-table th{font-size:9px;padding:6px 10px}.items-table td{padding:6px 10px;border-bottom:1px solid #f1f5f9}
.close-btn{float:right;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;color:#64748b}
.close-btn:hover{background:#e2e8f0}
.cal{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow-x:auto;margin-bottom:16px}
.cal table{width:100%;border-collapse:collapse;font-size:11px;min-width:900px}
.cal th{background:#f8fafc;padding:6px 4px;font-size:9px;text-transform:uppercase;letter-spacing:.3px;color:#64748b;border-bottom:1px solid #e2e8f0;text-align:center;position:sticky;top:0;white-space:nowrap}
.cal th:first-child{text-align:left;padding-left:12px;min-width:140px;position:sticky;left:0;background:#f8fafc;z-index:2}
.cal td{padding:4px;border-bottom:1px solid #f8fafc;text-align:center;white-space:nowrap}
.cal td:first-child{text-align:left;padding-left:12px;font-weight:600;font-size:11px;position:sticky;left:0;background:#fff;z-index:1}
.cal tr:hover td{background:#fafbfc}
.cal tr:hover td:first-child{background:#fafbfc}
.cal .cell{border-radius:4px;padding:2px 4px;font-size:9px;font-weight:600;display:inline-block;min-width:50px}
.cal .cell-bad{background:#fee2e2;color:#991b1b}
.cal .cell-ok{background:#d1fae5;color:#065f46}
.cal .cell-zero{background:#f8fafc;color:#cbd5e1}
.cal .cell-warn{background:#fef3c7;color:#92400e}
.cal .row-total td{font-weight:800;background:#f1f5f9!important;border-top:2px solid #e2e8f0}
.cal-tabs{display:flex;gap:4px;margin-bottom:10px}
.cal-tab{padding:6px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:#fff;color:#64748b;font-family:inherit}
.cal-tab:hover{background:#f8fafc}.cal-tab.active{background:#4f46e5;color:#fff;border-color:#4f46e5}
</style>
</head>

<div class="wrap">
<h1>Genesys — Dashboard de Licenças</h1>
<div class="sub">Custo vs Receita por cliente · Detalhamento 2025 a Mar/26</div>

<div id="detail"></div>
<div style="overflow-x:auto"><table><thead><tr>

  <th onclick="sortCol('margin')" class="num">Margem ↕</th>
  <th style="width:120px">Custo vs Receita</th>
  <th>Renovação</th>
  <th>Status</th>
</tr></thead><tbody id="tbody"></tbody></table></div>
</div>

var _filter='all';var _sort='gap';var _sortDir=1;

function fmt(n){return 'R$ '+Number(n||0).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0})}
function fmtK(n){n=Math.abs(n);if(n>=1e6)return 'R$ '+(n/1e6).toFixed(1)+'M';if(n>=1e3)return 'R$ '+(n/1e3).toFixed(0)+'k';return 'R$ '+n.toFixed(0)}

function setFilter(f){
  _filter=f;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active')});
  event.target.classList.add('active');
  render();
}
function sortCol(col){
  if(_sort===col)_sortDir*=-1;else{_sort=col;_sortDir=col==='name'?1:-1}
  render();
}

function render(){
  var q=(document.getElementById('search').value||'').toLowerCase();
  var list=DATA.filter(function(d){
    if(q&&d.cliente.toLowerCase().indexOf(q)===-1)return false;
    if(_filter==='gap')return d.gap<-1000;
    if(_filter==='ok')return d.gap>0;
    if(_filter==='internal')return d.cliente.match(/Licen|Mutant|Interaxa/i);
    return true;
  });

  list.sort(function(a,b){
    if(_sort==='name')return a.cliente.localeCompare(b.cliente)*_sortDir;
    if(_sort==='custo')return (b.total_custo-a.total_custo)*_sortDir;
    if(_sort==='receita')return (b.total_receita-a.total_receita)*_sortDir;
    if(_sort==='margin'){var am=a.total_custo?(a.gap/a.total_custo*100):0;var bm=b.total_custo?(b.gap/b.total_custo*100):0;return (am-bm)*_sortDir}
    return (a.gap-b.gap)*_sortDir;
  });

  // KPIs
  var totC=0,totR=0,gaps=0,oks=0;
  DATA.forEach(function(d){totC+=d.total_custo;totR+=d.total_receita;if(d.gap<-1000)gaps++;if(d.gap>0)oks++});
  document.getElementById('kpis').innerHTML=
    '<div class="kpi bad"><div class="v">'+fmtK(totC)+'</div><div class="l">Custo total Genesys</div></div>'
    +'<div class="kpi"><div class="v">'+fmtK(totR)+'</div><div class="l">Receita total clientes</div></div>'
    +'<div class="kpi bad"><div class="v">-'+fmtK(totC-totR)+'</div><div class="l">Gap total</div></div>'
    +'<div class="kpi warn"><div class="v">'+gaps+'</div><div class="l">Clientes com gap</div></div>'
    +'<div class="kpi ok"><div class="v">'+oks+'</div><div class="l">Clientes positivos</div></div>';

  // Table
  var maxC=Math.max.apply(null,list.map(function(d){return d.total_custo}));
  var html='';
  list.forEach(function(d){
    var margin=d.total_custo?(d.gap/d.total_custo*100):0;
    var barW=maxC?100:0;
    var cW=maxC?(d.total_custo/maxC*100):0;
    var rW=maxC?(d.total_receita/maxC*100):0;
    var tag=d.gap>0?'<span class="tag tag-ok">Positivo</span>':(d.gap<-100000?'<span class="tag tag-bad">Gap crítico</span>':'<span class="tag tag-warn">Gap</span>');
    var cls=d.gap<-100000?'gap-bad':'';
    html+='<tr class="'+cls+'">'
      +'<td><span class="client-name" onclick="showDetail(\''+d.cliente+'\')">'+d.cliente+'</span></td>'
      +'<td class="num">'+fmt(d.total_custo)+'</td>'
      +'<td class="num">'+fmt(d.total_receita)+'</td>'
      +'<td class="num" style="color:'+(d.gap<0?'#dc2626':'#059669')+';font-weight:700">'+fmt(d.gap)+'</td>'
      +'<td class="num" style="color:'+(margin<0?'#dc2626':'#059669')+'">'+margin.toFixed(1)+'%</td>'
      +'<td><div class="bar"><div class="bar-c" style="width:'+cW+'%"></div><div class="bar-r" style="width:'+rW+'%"></div></div></td>'
      +'<td style="font-size:11px">'+(d.renovacao||'—')+'</td>'
      +'<td>'+tag+'</td>'
      +'</tr>';
  });
  document.getElementById('tbody').innerHTML=html;
}

function showDetail(name){
  var d=DATA.find(function(x){return x.cliente===name});
  if(!d)return;
  var margin=d.total_custo?(d.gap/d.total_custo*100):0;
  var el=document.getElementById('detail');
  
  // Monthly chart
  var months=Object.keys(d.monthly).sort();
  var maxM=Math.max.apply(null,months.map(function(m){return Math.max(d.monthly[m].custo,d.monthly[m].receita)}));
  var chartH=100;
  var chartHtml='<div class="chart">';
  months.forEach(function(m){
    var cH=maxM?(d.monthly[m].custo/maxM*chartH):0;
    var rH=maxM?(d.monthly[m].receita/maxM*chartH):0;
    chartHtml+='<div class="chart-bar">'
      +'<div class="cb c" style="height:'+cH+'px" title="Custo '+fmt(d.monthly[m].custo)+'"></div>'
      +'<div class="cb r" style="height:'+rH+'px" title="Receita '+fmt(d.monthly[m].receita)+'"></div>'
      +'<div class="cl">'+m.slice(5)+'</div>'
      +'</div>';
  });
  chartHtml+='</div>';
  chartHtml+='<div style="font-size:10px;color:#94a3b8;display:flex;gap:12px;margin-bottom:16px"><span><span style="display:inline-block;width:10px;height:10px;background:#fca5a5;border-radius:2px"></span> Custo</span><span><span style="display:inline-block;width:10px;height:10px;background:#86efac;border-radius:2px"></span> Receita</span></div>';

  // Items table
  var itemsHtml='<table class="items-table"><tr><th>Licença / Item</th><th class="num">Custo (R$)</th><th class="num">Receita (R$)</th></tr>';
  d.top_items.forEach(function(it){
    itemsHtml+='<tr><td>'+it.name+'</td><td class="num">'+fmt(it.custo)+'</td><td class="num">'+fmt(it.receita)+'</td></tr>';
  });
  itemsHtml+='</table>';

  el.innerHTML='<button class="close-btn" onclick="document.getElementById(\'detail\').classList.remove(\'open\')">✕ Fechar</button>'
    +'<h2>'+d.cliente+'</h2>'
    +'<div class="dmeta">Início: '+(d.inicio||'—')+' · Duração: '+(d.duracao||'—')+' · Renovação: '+(d.renovacao||'—')+'</div>'
    +'<div class="dkpis">'
    +'<div class="dk bad"><b>'+fmtK(d.total_custo)+'</b>Custo total</div>'
    +'<div class="dk'+(d.total_receita>0?' ok':'')+'"><b>'+fmtK(d.total_receita)+'</b>Receita total</div>'
    +'<div class="dk'+(d.gap<0?' bad':' ok')+'"><b>'+fmtK(Math.abs(d.gap))+'</b>'+(d.gap<0?'Gap negativo':'Margem positiva')+'</div>'
    +'<div class="dk"><b>'+margin.toFixed(1)+'%</b>Margem</div>'
    +'</div>'
    +'<h3 style="font-size:13px;color:#64748b;margin-bottom:8px">Evolução mensal</h3>'
    +chartHtml
    +'<h3 style="font-size:13px;color:#64748b;margin-bottom:8px">Top licenças por custo</h3>'
    +itemsHtml;
  el.classList.add('open');
  el.scrollIntoView({behavior:'smooth'});
}

var _calView='gap'; // gap, custo, receita
function setCalView(v){_calView=v;document.querySelectorAll('.cal-tab').forEach(function(b){b.classList.toggle('active',b.dataset.v===v)});renderCalendar()}

function renderCalendar(){
  var el=document.getElementById('calendarView');
  var q=(document.getElementById('search').value||'').toLowerCase();
  var list=DATA.filter(function(d){
    if(q&&d.cliente.toLowerCase().indexOf(q)===-1)return false;
    if(_filter==='gap')return d.gap<-1000;
    if(_filter==='ok')return d.gap>0;
    if(_filter==='internal')return d.cliente.match(/Licen|Mutant|Interaxa/i);
    return true;
  });

  // All months
  var allMonths=new Set();
  DATA.forEach(function(d){Object.keys(d.monthly).forEach(function(m){allMonths.add(m)})});
  var months=Array.from(allMonths).sort();

  // Header
  var html='<div class="cal-tabs">';
  html+='<cal-tab style="font-size:12px;font-weight:700;color:#1e293b;padding:6px 0;margin-right:8px">Calendarização:</span>';
  html+='<button class="cal-tab'+(_calView==='gap'?' active':'')+'" data-v="gap" onclick="setCalView(\'gap\')">Gap (R-C)</button>';
  html+='<button class="cal-tab'+(_calView==='custo'?' active':'')+'" data-v="custo" onclick="setCalView(\'custo\')">Custo</button>';
  html+='<button class="cal-tab'+(_calView==='receita'?' active':'')+'" data-v="receita" onclick="setCalView(\'receita\')">Receita</button>';
  html+='</div>';

  html+='<div class="cal"><table><thead><tr><th>Cliente</th>';
  months.forEach(function(m){
    var parts=m.split('-');
    html+='<th>'+parts[1]+'/'+parts[0].slice(2)+'</th>';
  });
  html+='<th style="background:#eef2ff">TOTAL</th></tr></thead><tbody>';

  // Sort by total gap
  list.sort(function(a,b){return a.gap-b.gap});

  // Totals row data
  var colTotals={};months.forEach(function(m){colTotals[m]=0});
  var grandTotal=0;

  list.forEach(function(d){
    html+='<tr><td><span class="client-name" onclick="showDetail(\''+d.cliente+'\')">'+d.cliente+'</span></td>';
    var rowTotal=0;
    months.forEach(function(m){
      var md=d.monthly[m];
      var val=0;
      if(md){
        if(_calView==='gap')val=md.receita-md.custo;
        else if(_calView==='custo')val=md.custo;
        else val=md.receita;
      }
      colTotals[m]+=val;
      rowTotal+=val;

      var cls='cell-zero';
      if(_calView==='gap'){
        if(val<-1000)cls='cell-bad';else if(val>0)cls='cell-ok';else if(val<0)cls='cell-warn';
      } else if(_calView==='custo'){
        if(val>10000)cls='cell-bad';else if(val>0)cls='cell-warn';
      } else {
        if(val>0)cls='cell-ok';
      }
      var display=val===0?'—':fmtK(val);
      html+='<td><span class="cell '+cls+'">'+display+'</span></td>';
    });
    grandTotal+=rowTotal;
    var tCls=rowTotal<0?'cell-bad':'cell-ok';
    html+='<td><span class="cell '+tCls+'" style="font-size:10px">'+fmtK(rowTotal)+'</span></td>';
    html+='</tr>';
  });

  // Totals row
  html+='<tr class="row-total"><td>TOTAL</td>';
  months.forEach(function(m){
    var v=colTotals[m];
    var cls=v<0?'cell-bad':(v>0?'cell-ok':'cell-zero');
    html+='<td><span class="cell '+cls+'" style="font-size:10px">'+fmtK(v)+'</span></td>';
  });
  var gCls=grandTotal<0?'cell-bad':'cell-ok';
  html+='<td><span class="cell '+gCls+'" style="font-size:11px;font-weight:800">'+fmtK(grandTotal)+'</span></td>';
  html+='</tr></tbody></table></div>';

  el.innerHTML=html;
}

// Hook calendar into render
var _origRender=render;
render=function(){_origRender();renderCalendar()};
render();
